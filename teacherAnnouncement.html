<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Teacher Announcement</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <header class="bg-indigo-700 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">📢 Teacher Announcements</h1>

    <div class="flex items-center gap-4">

      <!-- Notification Bell -->
      <button onclick="openTeacherNotifications()"
  class="relative text-2xl p-2 rounded-full
         hover:bg-indigo-600 
         active:scale-90 
         transition-all duration-150 ease-in-out">
  
  🔔

  <span id="notifyCount"
    class="hidden absolute -top-1 -right-1 
           bg-red-600 text-white text-xs 
           px-1.5 py-0.5 rounded-full 
           min-w-[18px] text-center">
  </span>
</button>


      <!-- Back -->
      <button onclick="location.href='teacherDashboard.html'" class="bg-red-500 px-4 py-2 rounded hover:bg-red-600">
        Back
      </button>

    </div>
  </header>




  <main class="max-w-5xl mx-auto bg-white mt-6 p-6 rounded shadow">

    <!-- Add Announcement -->
    <h2 class="text-lg font-semibold mb-3">Post New Announcement</h2>

    <div class="grid gap-3">
      <input id="title" type="text" placeholder="Enter Title" class="p-2 border rounded">

      <textarea id="message" rows="4" placeholder="Write announcement..." class="p-2 border rounded"></textarea>

      <button onclick="postAnnouncement()" class="bg-indigo-600 text-white px-5 py-2 rounded 
         hover:bg-indigo-700 
         active:scale-95 
         transition-transform duration-150 w-fit">
        Post Announcement
      </button>

    </div>

    <!-- Announcement List -->
    <h2 class="text-lg font-semibold mt-8 mb-3">Your Announcements</h2>

    <div id="announcementList" class="space-y-3"></div>


  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
    <div class="bg-white w-full max-w-md p-5 rounded-lg shadow-lg">

      <h2 class="text-lg font-semibold mb-3">Edit Announcement</h2>

      <input id="editTitle" type="text" class="w-full p-2 border rounded mb-3">

      <textarea id="editMessage" rows="4" class="w-full p-2 border rounded mb-3"></textarea>

      <div class="flex justify-end gap-2">
        <button onclick="closeEditModal()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
          Cancel
        </button>

        <button onclick="saveEdit()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
          Save Changes
        </button>
      </div>

    </div>
  </div>
  <!-- Custom Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
    <div class="bg-white w-full max-w-sm p-5 rounded-lg shadow-lg">

      <h2 id="confirmText" class="text-lg font-semibold mb-4">
        Are you sure?
      </h2>

      <div class="flex justify-end gap-3">
        <button onclick="closeConfirmModal()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
          Cancel
        </button>

        <button id="confirmActionBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
          Yes
        </button>
      </div>

    </div>
  </div>
  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded shadow-lg hidden">
  </div>


  <script src="teacherAnnouncement.js"></script>
</body>

</html>
