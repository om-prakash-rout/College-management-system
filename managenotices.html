<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Notices</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes scale {
      from {
        transform: scale(0.7);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .animate-scale {
      animation: scale .2s ease-out;
    }
  </style>

</head>

<body class="bg-gray-100 text-gray-900">

  <!-- Navbar -->
  <header class="bg-gray-800 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">📢 Manage Notices</h1>
    <button onclick="location.href='adminDashboard.html'" class="bg-red-500 px-4 py-2 rounded">Back</button>
  </header>

  <main class="max-w-7xl mx-auto p-6 grid gap-6">

    <!-- Add/Edit Notice Form -->
    <div class="bg-white p-6 rounded-xl shadow-md w-full">
      <h2 class="text-xl font-semibold mb-4" id="formTitle">Add New Notice</h2>
      <form id="noticeForm" class="grid gap-4">
        <input type="hidden" name="id" id="noticeId">

        <input type="text" name="title" placeholder="Notice Title" class="w-full p-2 border rounded" required>
        <textarea name="description" placeholder="Notice Description" class="w-full p-2 border rounded" rows="4"
          required></textarea>

        <select name="targetRole" class="w-full p-2 border rounded">
          <option value="all" selected>All</option>
          <option value="student">Students</option>
          <option value="teacher">Teachers</option>
        </select>

        <div class="flex flex-col sm:flex-row gap-2">
          <button type="submit" id="submitBtn"
            class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 flex-1">Add Notice</button>
          <button type="button" id="cancelEdit"
            class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 flex-1 hidden">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Notices Table -->
    <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto w-full">
      <h2 class="text-xl font-semibold mb-4">All Notices</h2>
      <table class="w-full border-collapse border min-w-[600px]">
        <thead>
          <tr class="bg-gray-200">
            <th class="border p-2">ID</th>
            <th class="border p-2">Title</th>
            <th class="border p-2">Description</th>
            <th class="border p-2">Target Role</th>
            <th class="border p-2">Created At</th>
            <th class="border p-2">Actions</th>
          </tr>
        </thead>
        <tbody id="noticeTableBody"></tbody>
      </table>
    </div>

  </main>

  <footer class="bg-gray-900 text-gray-300 text-center p-4 mt-6">
    &copy; 2026 N.C. Autonomous College, Jajpur
  </footer>
  <!-- Toast Container -->
  <div id="toast" class="fixed bottom-6 right-6 bg-green-500 text-white px-4 py-2 rounded shadow-lg hidden z-50"></div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg w-[90%] max-w-sm p-6 text-center animate-scale">
      <h2 class="text-lg font-semibold mb-2">Confirm Delete</h2>
      <p class="text-gray-600 mb-4">Are you sure you want to delete this notice?</p>
      <div class="flex justify-center gap-4">
        <button id="cancelDelete" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
          Cancel
        </button>
        <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script src="manageNotices.js"></script>

  </script>
</body>

</html>
