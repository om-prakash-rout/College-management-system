<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Courses</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideDown {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slideDown {
      animation: slideDown 0.3s ease-out;
    }
  </style>

</head>

<body class="bg-gray-100 text-gray-900">

  <header class="bg-gray-800 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">📚 Manage Courses</h1>
    <button onclick="location.href='adminDashboard.html'" class="bg-red-500 px-4 py-2 rounded">Back</button>
  </header>

  <main class="max-w-6xl mx-auto p-6 grid gap-6">

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow-md">
      <h2 class="text-xl font-semibold mb-4">Add Course Structure</h2>

      <form id="courseForm" class="grid md:grid-cols-3 gap-4">

        <select id="natureSelect" name="nature" class="p-2 border rounded" required>
          <option value="" disabled selected>Select Nature</option>
        </select>

        <select id="courseSelect" name="course" class="p-2 border rounded" required>
          <option value="" disabled selected>Select Course</option>
        </select>

        <select id="branchSelect" name="branch" class="p-2 border rounded" required>
          <option value="" disabled selected>Select Branch</option>
        </select>

        <button class="bg-indigo-600 text-white px-4 py-2 rounded col-span-full hover:bg-indigo-700">
          Add Course
        </button>
      </form>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto">
      <h2 class="text-xl font-semibold mb-4">Course Structure</h2>

      <table class="w-full border-collapse border min-w-[700px]">
        <thead>
          <tr class="bg-gray-200">
            <th class="border p-2">ID</th>
            <th class="border p-2">Nature</th>
            <th class="border p-2">Course</th>
            <th class="border p-2">Branch</th>
            <th class="border p-2">Action</th>
          </tr>
        </thead>
        <tbody id="courseTableBody"></tbody>
      </table>
    </div>

  </main>
  <footer class="bg-gray-900 text-gray-300 text-center p-4">
    &copy; 2026 N.C. Autonomous College, Jajpur
  </footer>
  <!-- Toast -->
  <div id="toast" class="hidden fixed top-5 right-5 px-6 py-3 rounded-lg shadow-lg z-50 animate-slideDown">
    <span id="toastMsg"></span>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center animate-slideDown">
      <h3 class="text-lg font-semibold mb-3">Delete Course</h3>
      <p class="text-gray-600 mb-4">Are you sure you want to delete this course?</p>

      <div class="flex justify-center gap-3">
        <button id="cancelDelete" class="px-4 py-2 rounded bg-gray-400 hover:bg-gray-500">
          Cancel
        </button>
        <button id="confirmDelete" class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-700">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script src="manageCourses.js"></script>
</body>

</html>
