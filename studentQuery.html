<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Query</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-indigo-700 text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">💬 Student Query</h1>

  <div class="flex items-center gap-4">

    <!-- Notification -->
   <a href="studentViewQueries.html"
   class="relative text-2xl p-2 rounded-full hover:bg-indigo-600 transition active:scale-90"
   title="View Replies">
  🔔
  <span id="notifyDot"
    class="hidden absolute top-1 right-1 bg-red-500 w-3 h-3 rounded-full"></span>
</a>


    <!-- Back -->
    <a href="studentDashboard.html"
      class="bg-red-500 px-4 py-2 rounded">
      Back
    </a>

  </div>
</header>

<main class="max-w-xl mx-auto mt-6 bg-white p-6 rounded shadow">

  <form id="queryForm" class="space-y-4">

    <input type="text" id="studentName" placeholder="Your Name"
      class="w-full p-2 border rounded" required>

    <input type="text" id="roll" placeholder="Roll Number"
      class="w-full p-2 border rounded" required>

    <select id="course" class="w-full p-2 border rounded" required>
      <option value="">Select Course</option>
      <option value="+2 Arts">+2 Arts</option>
      <option value="+2 Science">+2 Science</option>
      <option value="+2 Commerce">+2 Commerce</option>
      <option value="+3 Arts">+3 Arts</option>
      <option value="+3 Science">+3 Science</option>
      <option value="+3 Commerce">+3 Commerce</option>
      <option value="BCA">BCA</option>
      <option value="BBA">BBA</option>
    </select>

    <select id="year" class="w-full p-2 border rounded" required>
      <option value="">Select Year</option>
      <option value="1">1st Year</option>
      <option value="2">2nd Year</option>
      <option value="3">3rd Year</option>
    </select>

    <input type="text" id="subject" placeholder="Subject"
      class="w-full p-2 border rounded" required>

    <textarea id="message" placeholder="Write your query here..."
      class="w-full p-2 border rounded h-28" required></textarea>

  <button
  class="w-full bg-indigo-600 text-white p-2 rounded 
         hover:bg-indigo-700 
         active:scale-95 
         transition-transform duration-150">
  Submit Query
</button>


  </form>

</main>
<!-- Toast -->
<div id="toast"
  class="fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded shadow-lg hidden transition-all duration-300">
</div>

<script src="studentQuery.js"></script>
</body>
</html>
