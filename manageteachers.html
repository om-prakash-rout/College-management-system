<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Teachers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
@keyframes slideDown {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.animate-slideDown {
  animation: slideDown 0.3s ease-out;
}
</style>

</head>
<body class="bg-gray-100 text-gray-900">

  <header class="bg-gray-800 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">👩‍🏫 Manage Teachers</h1>
    <button onclick="location.href='adminDashboard.html'" class="bg-red-500 px-4 py-2 rounded">Back</button>
  </header>

  <main class="max-w-7xl mx-auto p-6 grid gap-6">

    <!-- Form -->
    <div class="bg-white p-6 rounded-xl shadow-md w-full">
      <h2 class="text-xl font-semibold mb-4" id="formTitle">Add New Teacher</h2>
      <form id="teacherForm" class="grid gap-4">
        <input type="hidden" name="id" id="teacherId">

        <input type="text" name="fullName" placeholder="Full Name" class="w-full p-2 border rounded" required>
        <input type="email" name="email" placeholder="Email" class="w-full p-2 border rounded" required>
        <input type="password" name="password" id="passwordField" placeholder="Password" class="w-full p-2 border rounded" required>

        <input type="text" name="employeeId" placeholder="Employee ID" class="w-full p-2 border rounded" required>
        <input type="text" name="department" placeholder="Department" class="w-full p-2 border rounded" required>
        <input type="text" name="designation" placeholder="Designation" class="w-full p-2 border rounded" required>
        <input type="text" name="qualification" placeholder="Qualification" class="w-full p-2 border rounded" required>

        <input type="text" name="joiningDate" placeholder="Tap to enter joining date" class="w-full p-2 border rounded" required
               onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">

        <input type="text" name="phone" placeholder="Phone" class="w-full p-2 border rounded" required>
        <textarea name="address" placeholder="Address" class="w-full p-2 border rounded" required></textarea>

        <div class="flex flex-col sm:flex-row gap-2">
          <button type="submit" id="submitBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex-1">
            Add Teacher
          </button>
          <button type="button" id="cancelEdit" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 flex-1 hidden">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Table -->
    <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto w-full">
      <h2 class="text-xl font-semibold mb-4">Teacher List</h2>
      <table class="w-full border-collapse border min-w-[800px]">
        <thead>
          <tr class="bg-gray-200">
            <th class="border p-2">ID</th>
            <th class="border p-2">Name</th>
            <th class="border p-2">Email</th>
            <th class="border p-2">Employee ID</th>
            <th class="border p-2">Department</th>
            <th class="border p-2">Designation</th>
            <th class="border p-2">Phone</th>
            <th class="border p-2">Actions</th>
          </tr>
        </thead>
        <tbody id="teacherTableBody"></tbody>
      </table>
    </div>

  </main>

  <footer class="bg-gray-900 text-gray-300 text-center p-4 mt-6">
    &copy; 2026 N.C. Autonomous College, Jajpur
  </footer>
<!-- Toast -->
<div id="toast" class="hidden fixed top-5 right-5 px-6 py-3 rounded-lg shadow-lg z-50 animate-slideDown">
  <span id="toastMsg"></span>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center animate-slideDown">
    <h3 class="text-lg font-semibold mb-3">Delete Teacher</h3>
    <p class="text-gray-600 mb-4">Are you sure you want to delete this teacher?</p>

    <div class="flex justify-center gap-3">
      <button id="cancelDelete" class="px-4 py-2 rounded bg-gray-400 hover:bg-gray-500">
        Cancel
      </button>
      <button id="confirmDelete" class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-700">
        Delete
      </button>
    </div>
  </div>
</div>

  <script src="manageTeachers.js"></script>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      if(confirm("Are you sure you want to logout?")) window.location.href = "index.html";
    });
  </script>
</body>
</html>
